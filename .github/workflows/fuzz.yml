name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Seconds to fuzz each target"
        required: false
        default: "120"
      targets:
        description: "Comma-separated fuzz targets (empty = all)"
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Default fuzz duration for CI (seconds per target)
  DEFAULT_FUZZ_DURATION: 120

jobs:
  # ---------------------------------------------------------------------------
  # Fuzz Testing with Coverage Feedback
  # ---------------------------------------------------------------------------
  fuzz:
    name: Fuzz with Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_interest_accrual
          - fuzz_deposit_withdraw_roundtrip
          - fuzz_settlement_factor
          - fuzz_fee_calculations
          - fuzz_differential_interest
          - fuzz_vault_solvency
          - fuzz_scaled_balance_invariants
          - fuzz_borrow_repay_cycle
          - fuzz_instruction_parsing
          - fuzz_account_deserialization
          - fuzz_state_transitions
          - fuzz_market_state_consistency
          - fuzz_protocol_sequence
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install Rust stable toolchain (for coverage)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
            target
          key: fuzz-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('fuzz/Cargo.toml') }}
          restore-keys: |
            fuzz-${{ runner.os }}-${{ matrix.target }}-
            fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked 2>/dev/null || true

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked 2>/dev/null || true

      # -------------------------------------------------------------------
      # Download previous coverage baseline (if available)
      # -------------------------------------------------------------------
      - name: Download previous coverage report
        id: prev_coverage
        uses: actions/cache@v4
        with:
          path: .coverage-baseline/
          key: fuzz-coverage-baseline-${{ matrix.target }}-${{ github.ref }}
          restore-keys: |
            fuzz-coverage-baseline-${{ matrix.target }}-refs/heads/main
            fuzz-coverage-baseline-${{ matrix.target }}-

      - name: Record baseline coverage metrics
        id: baseline
        run: |
          mkdir -p .coverage-baseline
          if [ -f ".coverage-baseline/coverage.lcov" ]; then
            echo "Found previous coverage baseline"
            METRICS=$(python3 - ".coverage-baseline/coverage.lcov" <<'PYEOF'
          import sys
          lcov_path = sys.argv[1]
          lines_covered = 0
          lines_total = 0
          in_relevant = False
          with open(lcov_path) as f:
              for line in f:
                  line = line.strip()
                  if line.startswith("SF:"):
                      path = line[3:]
                      in_relevant = "/logic/" in path or "/processor/" in path
                  elif line == "end_of_record":
                      in_relevant = False
                  elif in_relevant and line.startswith("DA:"):
                      parts = line[3:].split(",")
                      if len(parts) >= 2:
                          lines_total += 1
                          if int(parts[1]) > 0:
                              lines_covered += 1
          pct = (lines_covered / lines_total * 100) if lines_total > 0 else 0
          print(f"{lines_covered} {lines_total} {pct:.2f}")
          PYEOF
            )
            read -r COV TOTAL PCT <<< "$METRICS"
            echo "baseline_pct=$PCT" >> "$GITHUB_OUTPUT"
            echo "baseline_lines=$COV/$TOTAL" >> "$GITHUB_OUTPUT"
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "No previous baseline found"
            echo "baseline_pct=0" >> "$GITHUB_OUTPUT"
            echo "baseline_lines=0/0" >> "$GITHUB_OUTPUT"
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------------------
      # Generate and seed corpus
      # -------------------------------------------------------------------
      - name: Generate seed files
        run: |
          python3 scripts/create_static_seeds.py

      - name: Seed corpus from fuzz/seeds/
        env:
          FUZZ_TARGET: ${{ matrix.target }}
        run: |
          # Map target names to seed directory names
          declare -A SEED_MAP
          SEED_MAP[fuzz_interest_accrual]="interest_accrual"
          SEED_MAP[fuzz_deposit_withdraw_roundtrip]="deposit_scaling"
          SEED_MAP[fuzz_settlement_factor]="settlement_factor"
          SEED_MAP[fuzz_fee_calculations]="fee_computation"

          TARGET="$FUZZ_TARGET"
          SEED_DIR_NAME="${SEED_MAP[$TARGET]:-}"

          if [ -n "$SEED_DIR_NAME" ] && [ -d "fuzz/seeds/$SEED_DIR_NAME" ]; then
            CORPUS_DIR="fuzz/corpus/$TARGET"
            mkdir -p "$CORPUS_DIR"
            cp -n "fuzz/seeds/$SEED_DIR_NAME"/* "$CORPUS_DIR/" 2>/dev/null || true
            SEED_COUNT=$(find "$CORPUS_DIR" -type f | wc -l)
            echo "Seeded $CORPUS_DIR with $SEED_COUNT files"
          else
            echo "No static seeds for $TARGET"
          fi

      # Also seed from generate_fuzz_seeds.py if a baseline LCOV exists
      - name: Generate targeted seeds from coverage
        if: steps.baseline.outputs.has_baseline == 'true'
        env:
          FUZZ_TARGET: ${{ matrix.target }}
        run: |
          TARGET="$FUZZ_TARGET"
          python3 scripts/generate_fuzz_seeds.py \
            --lcov .coverage-baseline/coverage.lcov \
            --output-dir fuzz/corpus \
            --source-root . \
            --targets "$TARGET" || echo "Targeted seed generation skipped (target not supported)"

      # -------------------------------------------------------------------
      # Run fuzzing
      # -------------------------------------------------------------------
      - name: Determine fuzz duration
        id: duration
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_FUZZ_DURATION" ]; then
            echo "seconds=$INPUT_FUZZ_DURATION" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            echo "seconds=300" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=$DEFAULT_FUZZ_DURATION" >> "$GITHUB_OUTPUT"
          fi

      - name: Run cargo fuzz
        id: fuzz_run
        env:
          TARGET: ${{ matrix.target }}
          DURATION: ${{ steps.duration.outputs.seconds }}
        run: |
          CORPUS_DIR="fuzz/corpus/$TARGET"
          mkdir -p "$CORPUS_DIR"

          echo "Fuzzing $TARGET for ${DURATION}s..."

          cd fuzz
          cargo +nightly fuzz run "$TARGET" "../$CORPUS_DIR" \
            -- -max_total_time="$DURATION" \
            2>&1 | tee "../fuzz-output.log" || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 77 ]; then
              echo "Fuzzer timed out (expected)"
              echo "status=timeout" >> "$GITHUB_OUTPUT"
            else
              echo "Fuzzer found a crash or error (exit $EXIT_CODE)"
              echo "status=crash" >> "$GITHUB_OUTPUT"
            fi
          }

          if [ -z "$(grep -l 'status=' "$GITHUB_OUTPUT" 2>/dev/null)" ]; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------------------
      # Post-fuzz coverage measurement
      # -------------------------------------------------------------------
      - name: Measure post-fuzz coverage
        id: post_coverage
        run: |
          # Switch to stable for coverage
          cargo +stable llvm-cov clean --workspace 2>/dev/null || true

          cargo +stable llvm-cov test \
            --features no-entrypoint \
            --lcov --output-path .coverage-baseline/coverage.lcov \
            --branch \
            --ignore-filename-regex '(tests/|fuzz/|kani_proofs)' \
            2>&1 | tail -5

          METRICS=$(python3 - ".coverage-baseline/coverage.lcov" <<'PYEOF'
          import sys
          lcov_path = sys.argv[1]
          lines_covered = 0
          lines_total = 0
          in_relevant = False
          with open(lcov_path) as f:
              for line in f:
                  line = line.strip()
                  if line.startswith("SF:"):
                      path = line[3:]
                      in_relevant = "/logic/" in path or "/processor/" in path
                  elif line == "end_of_record":
                      in_relevant = False
                  elif in_relevant and line.startswith("DA:"):
                      parts = line[3:].split(",")
                      if len(parts) >= 2:
                          lines_total += 1
                          if int(parts[1]) > 0:
                              lines_covered += 1
          pct = (lines_covered / lines_total * 100) if lines_total > 0 else 0
          print(f"{lines_covered} {lines_total} {pct:.2f}")
          PYEOF
          )
          read -r COV TOTAL PCT <<< "$METRICS"
          echo "post_pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "post_lines=$COV/$TOTAL" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------
      # Coverage comparison summary
      # -------------------------------------------------------------------
      - name: Coverage improvement summary
        id: summary
        env:
          BASELINE: ${{ steps.baseline.outputs.baseline_pct }}
          POST: ${{ steps.post_coverage.outputs.post_pct }}
          FUZZ_TARGET: ${{ matrix.target }}
        run: |
          TARGET="$FUZZ_TARGET"

          DELTA=$(python3 -c "print(f'{$POST - $BASELINE:+.2f}')")

          echo "=========================================="
          echo "  Coverage Summary: $TARGET"
          echo "=========================================="
          echo "  Baseline:  ${BASELINE}%"
          echo "  Post-fuzz: ${POST}%"
          echo "  Delta:     ${DELTA}%"
          echo "=========================================="

          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"
          echo "summary=**$TARGET**: ${POST}% (${DELTA}% from baseline)" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------
      # Upload artifacts
      # -------------------------------------------------------------------
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz-output.log
          retention-days: 30

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          path: fuzz/corpus/${{ matrix.target }}/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Aggregate coverage results and post PR comment
  # ---------------------------------------------------------------------------
  fuzz-summary:
    name: Fuzz Coverage Summary
    runs-on: ubuntu-latest
    needs: fuzz
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Post coverage summary on PR
        uses: actions/github-script@v7
        env:
          FUZZ_RESULT: ${{ needs.fuzz.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const targets = [
              'fuzz_interest_accrual',
              'fuzz_deposit_withdraw_roundtrip',
              'fuzz_settlement_factor',
              'fuzz_fee_calculations',
              'fuzz_differential_interest',
              'fuzz_vault_solvency',
              'fuzz_scaled_balance_invariants',
              'fuzz_borrow_repay_cycle',
              'fuzz_instruction_parsing',
              'fuzz_account_deserialization',
              'fuzz_state_transitions',
              'fuzz_market_state_consistency',
              'fuzz_protocol_sequence',
            ];

            // Build the summary table from job results
            const body = `## Fuzz Testing Summary

            | Target | Status |
            |--------|--------|
            ${targets.map(t => `| \`${t}\` | ${process.env.FUZZ_RESULT === 'success' ? ':white_check_mark:' : ':warning:'} |`).join('\n')}

            > Fuzz duration: ${process.env.DEFAULT_FUZZ_DURATION || 120}s per target
            > Corpus seeded from \`fuzz/seeds/\` with coverage-guided generation

            <details>
            <summary>Coverage feedback loop details</summary>

            The fuzzing workflow:
            1. Downloads previous coverage baseline (if cached)
            2. Seeds corpus from \`fuzz/seeds/\` (hand-crafted) and \`generate_fuzz_seeds.py\` (coverage-guided)
            3. Runs \`cargo fuzz\` for each target
            4. Measures post-fuzz coverage and compares to baseline
            5. Caches the new coverage report for the next run

            Coverage reports and crash artifacts are available as workflow artifacts.
            </details>
            `.replace(/^            /gm, '');

            const marker = '## Fuzz Testing Summary';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
