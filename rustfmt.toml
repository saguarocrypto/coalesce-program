# Rustfmt configuration for CoalesceFi Pinocchio program
# Only stable options — nightly-only settings removed to avoid warnings

# Edition
edition = "2021"

# Formatting
max_width = 100
tab_spaces = 4
hard_tabs = false
newline_style = "Unix"

# Imports
reorder_imports = true
reorder_modules = true

# Functions
fn_params_layout = "Tall"

# Match
match_block_trailing_comma = true

# Misc
use_small_heuristics = "Default"
use_field_init_shorthand = true
use_try_shorthand = true
