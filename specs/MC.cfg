\* -----------------------------------------------------------------------
\* MC.cfg — TLC Model Checking Configuration for CoalesceFi.tla
\*
\* Uses scaled-down constants to keep the state space feasible:
\*   WAD = 1000 (instead of 1e18)
\*   BPS = 100  (instead of 10000)
\*   SECONDS_PER_YEAR = 100 (instead of 31536000)
\*
\* To run with TLC:
\*   java -jar tla2tools.jar -config MC.cfg CoalesceFi.tla
\*
\* Or with the TLA+ Toolbox IDE: Import CoalesceFi.tla and
\* create a new model with these constant assignments.
\* -----------------------------------------------------------------------

CONSTANTS
    WAD = 1000
    BPS = 100
    SECONDS_PER_YEAR = 100
    MaxAmount = 5
    AnnualInterestBps = 10
    FeeRateBps = 5
    MaturityTimestamp = 6
    MaxTotalSupply = 50
    WhitelistMaxCapacity = 50

CONSTANT
    Lenders = {L1, L2}

SPECIFICATION
    Spec

INVARIANTS
    AllInvariants
